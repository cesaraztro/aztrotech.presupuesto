<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AztroTech Presupuesto</title>
  <meta name="description" content="Producto financiero multiusuario para deudas, ventas, recompensas y calendario.">
  <meta name="theme-color" content="#071018">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800;900&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="assets/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script type="module" src="assets/app.js"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="side">
      <div class="brand">
        <div class="brand-mark">AZTROTECH</div>
        <div class="brand-pill">FINANCE OS</div>
      </div>
      <nav class="nav" id="nav" aria-label="Navegacion principal"></nav>
      <div class="side-footer">
        <div id="save-chip" class="save-chip local">Inicializando</div>
        <div id="user-chip" class="user-chip"><span>Sin sesion</span></div>
      </div>
    </aside>

    <main class="main">
      <div class="mobile-top">
        <div class="brand-mark" id="mobile-brand">AZTROTECH</div>
        <div class="brand-pill">FINANCE OS</div>
      </div>

      <header class="topbar">
        <div>
          <div class="eyebrow" id="page-eyebrow">Producto financiero</div>
          <h1 id="page-title">Tu plan financiero</h1>
          <p class="lead" id="page-lead">Deudas, ventas, recompensas y calendario en un solo command center.</p>
        </div>
        <div class="actions" id="header-actions"></div>
      </header>

      <div class="month-strip" id="month-strip" aria-label="Mes activo"></div>

      <section id="view-dashboard" class="view active"></section>
      <section id="view-debts" class="view"></section>
      <section id="view-sales" class="view"></section>
      <section id="view-rewards" class="view"></section>
      <section id="view-calendar" class="view"></section>
      <section id="view-settings" class="view"></section>
    </main>
  </div>

  <div id="auth-overlay" class="auth-overlay" aria-live="polite"></div>
  <div id="onboarding-overlay" class="onboarding-overlay" aria-live="polite"></div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch((err) => console.warn("SW no registrado:", err));
      });
    }
  </script>
</body>
</html>
